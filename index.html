<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Universe — Global AI News Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <h1 class="logo">AI <span>Universe</span></h1>
            <p class="tagline">Global AI News Explorer</p>
        </div>
        <div class="header-center">
            <div id="week-selector">
                <button class="week-nav" id="prev-week" aria-label="Previous week">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                </button>
                <div id="week-tabs"></div>
                <button class="week-nav" id="next-week" aria-label="Next week">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                </button>
            </div>
            <div id="week-date-range"></div>
        </div>
        <div class="header-right">
            <div id="legend">
                <div class="legend-item"><span class="legend-dot" style="background:#ffd700"></span> Core LLMs</div>
                <div class="legend-item"><span class="legend-dot" style="background:#6ec6ff"></span> AI Wrappers</div>
                <div class="legend-item"><span class="legend-dot" style="background:#c97dff"></span> Industry AI</div>
            </div>
        </div>
    </header>

    <!-- Universe -->
    <main id="universe-viewport">
        <canvas id="starfield"></canvas>
        <div id="universe">
            <!-- 3D decorative layer (non-interactive, tilted for depth) -->
            <div id="universe-3d">
                <!-- Nebula effects -->
                <div class="nebula nebula-1"></div>
                <div class="nebula nebula-2"></div>
                <div class="nebula nebula-3"></div>

                <!-- Orbital rings -->
                <div class="orbit-ring orbit-inner"></div>
                <div class="orbit-ring orbit-middle"></div>
                <div class="orbit-ring orbit-outer"></div>
                <div class="orbit-ring orbit-outer2"></div>

                <!-- Central Sun -->
                <div id="sun">
                    <div class="sun-pulse"></div>
                    <div class="sun-glow"></div>
                    <div class="sun-body"></div>
                    <div class="sun-label">AI Core</div>
                </div>

                <!-- Layer labels -->
                <div class="orbit-label orbit-label-inner">Core LLMs</div>
                <div class="orbit-label orbit-label-middle">AI Wrappers</div>
                <div class="orbit-label orbit-label-outer">Industry Agents</div>
            </div>

            <!-- Flat interactive layer (celestial bodies injected by JS) -->
        </div>
    </main>

    <!-- Tooltip -->
    <div id="tooltip" class="hidden">
        <div class="tooltip-header">
            <span class="tooltip-dot"></span>
            <h3 class="tooltip-name"></h3>
            <span class="tooltip-layer-badge"></span>
        </div>
        <ul class="tooltip-news-list"></ul>
        <div class="tooltip-hint">Click to read more &rarr;</div>
    </div>

    <!-- News Panel -->
    <aside id="news-panel" class="closed">
        <button id="panel-close" aria-label="Close panel">&times;</button>
        <div class="panel-header">
            <div class="panel-icon"></div>
            <div>
                <h2 class="panel-title"></h2>
                <span class="panel-layer"></span>
            </div>
        </div>
        <div class="panel-week-label"></div>
        <div class="panel-body"></div>
    </aside>

    <!-- Planet Landing View -->
    <div id="landing-overlay" class="landing-hidden">
        <div class="landing-backdrop"></div>
        <button id="landing-back" aria-label="Back to universe">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Back to Universe</span>
        </button>
        <div class="landing-planet">
            <div class="landing-planet-glow"></div>
            <div class="landing-planet-body"></div>
            <h2 class="landing-planet-name"></h2>
            <span class="landing-planet-layer"></span>
        </div>
        <div class="landing-week-label"></div>
        <div class="landing-news-grid"></div>
    </div>

    <script src="script.js"></script>
    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Vercel Speed Insights -->
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
